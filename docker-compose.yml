version: '3.9'

services:
  postgres:
    image: postgres:12.2-alpine
    container_name: ttt-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "nakama"]
      interval: 5s
      timeout: 3s
      retries: 10

  nakama:
    image: heroiclabs/nakama:3.24.2
    container_name: ttt-nakama
    entrypoint:
      - /bin/sh
      - -ecx
      - >
        /nakama/nakama migrate up
        --database.address nakama:localdb@postgres:5432/nakama?sslmode=disable &&
        /nakama/nakama
        --name nakama-ttt
        --database.address nakama:localdb@postgres:5432/nakama?sslmode=disable
        --logger.level DEBUG
        --session.token_expiry_sec 7200
        --socket.server_key defaultkey
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7349:7349"   # gRPC
      - "7350:7350"   # HTTP API + WebSocket
      - "7351:7351"   # Console
    volumes:
      - ./nakama/build:/nakama/data/modules
    restart: unless-stopped

volumes:
  pgdata:
